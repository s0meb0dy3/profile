<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Workspace</title>
  <link rel="stylesheet" href="/assets/editor.css" />
</head>
<body>
  <div class="workspace">
    <header class="workspace-header">
      <div>
        <p class="eyebrow">Local Resume Workspace</p>
        <h1>MD + CSS 简历工作台</h1>
      </div>
      <div class="workspace-actions">
        <button id="saveButton" class="ghost">立即保存</button>
        <button id="buildButton" class="ghost">重建预览</button>
        <button id="exportButton" class="primary">导出单页 PDF</button>
      </div>
    </header>

    <section class="status-strip">
      <div class="status-card">
        <span class="label">保存状态</span>
        <strong id="saveStatus">加载中</strong>
      </div>
      <div class="status-card">
        <span class="label">预览状态</span>
        <strong id="buildStatus">等待构建</strong>
      </div>
      <div class="status-card wide">
        <span class="label">系统消息</span>
        <strong id="messageStatus">准备就绪后可直接编辑。</strong>
      </div>
    </section>

    <main class="workspace-grid">
      <section class="panel panel-editor">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Content</p>
            <h2>Markdown</h2>
          </div>
          <button id="aiMarkdownButton" class="panel-button">AI 修改 Markdown</button>
        </div>
        <textarea id="markdownEditor" spellcheck="false"></textarea>
      </section>

      <section class="panel panel-editor">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Style</p>
            <h2>CSS</h2>
          </div>
          <button id="aiCssButton" class="panel-button">AI 修改 CSS</button>
        </div>
        <textarea id="cssEditor" spellcheck="false"></textarea>
      </section>

      <section class="panel panel-preview">
        <div class="panel-header">
          <div>
            <p class="panel-kicker">Preview</p>
            <h2>实时简历</h2>
          </div>
          <a id="previewLink" class="panel-link" href="/preview" target="_blank" rel="noreferrer">新窗口打开</a>
        </div>
        <iframe id="previewFrame" title="Resume preview" src="/preview"></iframe>
      </section>
    </main>
  </div>

  <script type="module" src="/assets/editor.js"></script>
</body>
</html>
